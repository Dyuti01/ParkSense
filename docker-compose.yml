# ParkSense AI — Docker Compose
# Run with: docker compose up -d

services:
  db:
    # image: postgres:17
    image: dyuti01/parksense-db:latest  # This image contains already has the dataset inserted
    platform: linux/amd64
    container_name: parksense-db
    environment:
      POSTGRES_DB: parksense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: parksense123
    ports:
      - "5433:5432"
    # volumes:
    #   - parksense_data:/var/lib/postgresql/data
    #   - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d parksense" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: parksense-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:parksense123@db:5432/parksense
      - ML_MODEL_PATH=models/
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: parksense-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

